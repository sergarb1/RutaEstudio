<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.ico" sizes="48x48" />
  <link rel="icon" href="favicon.svg" sizes="any" type="image/svg+xml" />
  <link rel="icon" href="favicon-96x96.png" sizes="96x96" type="image/png" />
  <link rel="apple-touch-icon" href="favicon-96x96.png" />
  <meta name="apple-mobile-web-app-title" content="RutaEstudio" />
  <title>RutaEstudio — Tu camino hacia el aprobado</title>

  <!-- Tailwind CSS config first, then CDN + fallback local -->
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = { darkMode: 'class' };
    (function() {
      var s = document.createElement('script');
      s.src = 'https://cdn.tailwindcss.com';
      s.onerror = function() {
        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'fallback/tailwind.min.css';
        document.head.appendChild(link);
      };
      document.head.appendChild(s);
    })();
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Custom styles -->
  <link rel="stylesheet" href="css/app.css" />
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen transition-colors">

  <!-- Skip to content link (inline style ensures it's hidden before Tailwind loads) -->
  <a href="#app-content" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-[100] focus:px-4 focus:py-2 focus:bg-indigo-600 focus:text-white focus:rounded-lg focus:text-sm focus:font-medium focus:outline-none" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0">
    Saltar al contenido principal
  </a>

<script type="text/template" id="app-template">
    <div id="app-content" class="max-w-6xl mx-auto px-4 py-6" :class="focusMode ? 'max-w-full px-2' : ''">
      <app-header :dark="dark" :lang="lang" :can-install="canInstall"
        @toggle-dark="toggleDark()"
        @set-lang="setLang($event)"
        @install="installApp()"
        @import-data="importData()"
        @export-data="exportData()"
        @open-template-info="modal='templateInfo'"
        @open-global-search="openGlobalSearch()" />

      <gamification-bar
        :level-icon="levelIcon"
        :level-title="levelTitle"
        :user-level="userLevel"
        :next-level-xp="nextLevelXP"
        :level-progress="levelProgress"
        :unlocked-achievements="unlockedAchievements"
        :daily-progress="dailyProgress"
        :daily-goal="dailyGoal"
        @toggle-achievements="showAchievements = !showAchievements" />

      <subject-list v-if="view === 'subjects'"
        :subjects="subjects"
        @select="selectSubject"
        @add="addSubject"
        @help="showHelp"
        @example="loadExample"
        @globalGraph="goToGlobalGraph"
        @import="importData"
        @exportTemplate="exportTemplate"
        @templateInfo="modal='templateInfo'"
        @importSubject="importSubjectJSON"
        @tutorial="showTutorial"
        @deleteSubject="confirmDeleteSubject"
        @exportCard="exportSubjectCard"
        @importSubjectJSON="importSubjectJSON" />

      <subject-detail v-if="view === 'subject' && currentSubject"
        :root="this"
        :current-subject="currentSubject"
        :filtered-concepts="filteredConcepts"
        :all-relation-types="allRelationTypes"
        :last-assessment="lastAssessment"
        :overall-score="overallScore"
        :stats="stats"
        :roadmap-groups="roadmapGroups"
        :plan-algorithm="planAlgorithm"
        :subject-assessments-list="subjectAssessmentsList"
        :graph-loading="graphLoading"
        :graph-rel-filter="graphRelFilter"
        :graph-weight-min="graphWeightMin"
        :show-legend="showLegend"
        :assess-scores="assessScores"
        @back="view='subjects'; destroyGraph()"
        @edit-subject="editSubject()"
        @export-json="exportSubjectJSON()" />



    </div>  <!-- end #app-content -->

    <global-graph v-if="view === 'globalGraph'" :subjects="subjects" :store="store" @back="view='subjects'" />
    <app-footer />
    <inspector-panel :concept="currentSubject?.concepts.find(c=>c.id===inspectorConcept)" :subject="currentSubject" :active-tab="inspectorTab" :inspector-data="inspector" :new-resource-url="newResourceUrl" :new-resource-title="newResourceTitle" :new-resource-type="newResourceType" @close="closeInspector()" @update:activeTab="inspectorTab = $event" @open-concept="openInspector($event)" @add-resource="addResource()" @remove-resource="removeResource($event)" @update:newResourceUrl="newResourceUrl = $event" @update:newResourceTitle="newResourceTitle = $event" @update:newResourceType="newResourceType = $event" />
    <onboarding-overlay :show="showOnboardingComputed" :step="onboardingStep" :steps="onboardingSteps" @close="closeOnboarding()" @next="onboardingStep++" @prev="onboardingStep--" @go-to-step="onboardingStep = $event" />
    <achievements-modal :show="showAchievementsComputed" :level-icon="levelIcon" :user-level="userLevel" :level-title="levelTitle" :user-xp="userXP" :achievements-list="achievementsList" @close="showAchievements = false" />
    <help-modal v-if="modal === 'help'" @close="modal=''" />
    <subject-modal :show="modal === 'subject' || modal === 'concept'" :mode="modal === 'subject' ? 'subject' : 'concept'" :title="modalTitle" :template-tab="templateTab" :edit-name="editName" :edit-desc="editDesc" :edit-concept-name="editConceptName" :edit-concept-desc="editConceptDesc" :edit-concept-weight="editConceptWeight" :edit-concept-tags="editConceptTags" :template-search="templateSearch" :filtered-templates="filteredTemplates" @close="modal=''" @save-subject="saveSubject()" @save-concept="saveConcept()" @update:editName="editName = $event" @update:editDesc="editDesc = $event" @update:editConceptName="editConceptName = $event" @update:editConceptDesc="editConceptDesc = $event" @update:editConceptWeight="editConceptWeight = $event" @update:editConceptTags="editConceptTags = $event" @update:templateTab="templateTab = $event" @update:templateSearch="templateSearch = $event" @select-template="createFromTemplate($event[0], $event[1])" />
    <template-info-modal :show="modal === 'templateInfo'" @close="modal=''" @download-template="exportTemplate()" />
    <confirm-delete-modal :show="modal === 'confirmDelete'" :target="deleteTarget" @close="modal=''; deleteTarget=null" @confirm="executeDeleteSubject()" @export-data="exportData()" />
    <toast-popup :toast="toast" @dismiss="dismissToast()" />
    <global-search-popup :show="globalSearchOpen" :query="globalSearch" :results="globalResults" @close="closeGlobalSearch()" @update:query="globalSearch = $event" @go-to-concept="goToConcept($event[0], $event[1])" />
    <shortcuts-modal :show="modal === 'shortcuts'" @close="modal=''" />
    <custom-types-modal :show="modal === 'customTypes'" :types="store.customRelationTypes" :edit-name="customTypeName" :edit-color="customTypeColor" :edit-dash="customTypeDash" :edit-width="customTypeWidth" :edit-arrow="customTypeArrow" :edit-id="customTypeEditId" @close="modal = ''" @add-type="addCustomType()" @edit-type="editCustomType($event)" @delete-type="deleteCustomType($event)" @save-edit="saveCustomTypeEdit()" @cancel-edit="cancelCustomTypeEdit()" @update:editName="customTypeName = $event" @update:editColor="customTypeColor = $event" @update:editDash="customTypeDash = $event" @update:editWidth="customTypeWidth = $event" @update:editArrow="customTypeArrow = $event" />
    <focus-mode-btn :show="view === 'subject' && tab === 'graph'" :active="focusMode" @toggle="toggleFocusMode()" />
  </script>
  <div id="app" v-cloak></div>

  <!-- Install Prompt -->
  <script>
    (function() {
      window.deferredPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.deferredPrompt = e;
      });
      window.addEventListener('appinstalled', function() {
        window.deferredPrompt = null;
      });
    })();
  </script>

  <!-- Bootloader: loads scripts in order with CDN + local fallback -->
  <script>
    (function() {
      var queue = [
        { src: 'https://unpkg.com/vue@3.5.39/dist/vue.global.prod.js', fallback: 'fallback/vue.global.prod.js' },
        { src: 'https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js', fallback: 'fallback/vis-network.min.js' },
        { src: 'js/helpers.js' },
        { src: 'js/i18n.js' },
        { src: 'js/store.js' },
        { src: 'js/graph-engine.js' },
        { src: 'js/study-plan.js' },
        { src: 'components/subject-list.js' },
        { src: 'components/global-graph.js' },
        { src: 'components/subject-detail.js' },
        { src: 'components/help-modal.js' },
        { src: 'components/app-header.js' },
        { src: 'components/app-footer.js' },
        { src: 'components/gamification-bar.js' },
        { src: 'components/inspector-panel.js' },
        { src: 'components/onboarding-overlay.js' },
        { src: 'components/achievements-modal.js' },
        { src: 'components/subject-modal.js' },
        { src: 'components/template-info-modal.js' },
        { src: 'components/confirm-delete-modal.js' },
        { src: 'components/toast-popup.js' },
        { src: 'components/global-search-popup.js' },
        { src: 'components/shortcuts-modal.js' },
        { src: 'components/custom-types-modal.js' },
        { src: 'components/focus-mode-btn.js' },
        { src: 'components/concepts-tab.js' },
        { src: 'components/graph-tab.js' },
        { src: 'components/assess-tab.js' },
        { src: 'components/results-tab.js' },
        { src: 'components/history-tab.js' },
        { src: 'js/templates.js' },
        { src: 'js/editor.js' },
        { src: 'js/study.js' },
        { src: 'js/gamification.js' },
        { src: 'js/app.js' }
      ];

      function load(idx) {
        if (idx >= queue.length) return;
        var entry = queue[idx];
        var s = document.createElement('script');
        s.src = entry.src;
        s.onload = function() { load(idx + 1); };
        s.onerror = function() {
          if (entry.fallback) {
            var f = document.createElement('script');
            f.src = entry.fallback;
            f.onload = function() { load(idx + 1); };
            f.onerror = function() { load(idx + 1); };
            document.head.appendChild(f);
          } else {
            load(idx + 1);
          }
        };
        document.head.appendChild(s);
      }
      load(0);
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>
</body>
</html>
