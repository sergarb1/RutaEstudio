<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Brain/network icon -->
  <g transform="translate(256,256)" fill="none" stroke="white" stroke-width="12" stroke-linecap="round">
    <!-- Central node -->
    <circle cx="0" cy="0" r="30" fill="white" stroke="none"/>
    <!-- Connected nodes -->
    <circle cx="-100" cy="-80" r="20" fill="rgba(255,255,255,0.3)" stroke="white"/>
    <circle cx="100" cy="-70" r="20" fill="rgba(255,255,255,0.3)" stroke="white"/>
    <circle cx="-80" cy="90" r="20" fill="rgba(255,255,255,0.3)" stroke="white"/>
    <circle cx="90" cy="80" r="20" fill="rgba(255,255,255,0.3)" stroke="white"/>
    <circle cx="-120" cy="20" r="15" fill="rgba(255,255,255,0.2)"/>
    <circle cx="110" cy="10" r="15" fill="rgba(255,255,255,0.2)"/>
    <!-- Connections -->
    <line x1="-100" y1="-80" x2="0" y2="0"/>
    <line x1="100" y1="-70" x2="0" y2="0"/>
    <line x1="-80" y1="90" x2="0" y2="0"/>
    <line x1="90" y1="80" x2="0" y2="0"/>
    <line x1="-120" y1="20" x2="0" y2="0"/>
    <line x1="110" y1="10" x2="0" y2="0"/>
    <!-- Cross connections -->
    <line x1="-100" y1="-80" x2="-120" y2="20" stroke-dasharray="8,8" stroke-width="8" stroke="rgba(255,255,255,0.5)"/>
    <line x1="100" y1="-70" x2="110" y2="10" stroke-dasharray="8,8" stroke-width="8" stroke="rgba(255,255,255,0.5)"/>
  </g>
  <!-- Study book at bottom -->
  <g transform="translate(256,370)" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-60,-20 L-60,30 L0,10 L60,30 L60,-20 L0,0 Z" stroke="none" fill="rgba(255,255,255,0.2)"/>
    <path d="M-60,-20 L-60,30 L0,10 L60,30 L60,-20"/>
    <line x1="0" y1="10" x2="0" y2="-40" stroke-width="10"/>
    <path d="M-60,-20 L0,-40 L60,-20" fill="none"/>
  </g>
</svg>
